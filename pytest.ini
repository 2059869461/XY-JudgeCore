[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

addopts = 
    -v
    --strict-markers
    --tb=short

markers =
    boundary: Boundary tests (judge status validation)
    idempotency: Idempotency tests (result consistency)
    stress: Stress tests (high concurrency)
    security: Security tests (sandbox validation)

filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S
